version: "2"

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - contextcheck
    - cyclop
    - errcheck
    - gocognit
    - gosec
    - misspell
    - noctx
  settings:
    cyclop:
      max-complexity: 20
    gocognit:
      min-complexity: 30
  exclusions:
    generated: lax
    presets:
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - gocognit
          - gosec
      # These boundaries intentionally use manager-owned or detached cleanup
      # contexts so work can outlive an HTTP request or finish after cancel.
      - path: internal/(cli/(app|cloud_benchmark_run|lab)|lab/(cloud.*|server))\.go
        linters:
          - contextcheck
