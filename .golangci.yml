version: "2"

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - cyclop
    - errcheck
    - gocognit
    - misspell
  settings:
    cyclop:
      max-complexity: 20
    gocognit:
      min-complexity: 30
  exclusions:
    generated: lax
    presets:
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - gocognit
